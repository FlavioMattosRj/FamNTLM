# FamNTLM / CNTLM sample configuration.
# Fully compatible with the original cntlm.conf format.

Username        testuser
Domain          CORP
# Workstation   MYHOST            # defaults to this machine's hostname

# Store hashes instead of a plaintext password. Generate them with:
#   java -jar famntlm.jar -H -u testuser -d CORP
# Password      plaintext-here    # alternative: plaintext (hashed at startup)
PassLM          E52CAC67419A9A224A3B108F3FA6CB6D
PassNT          A4F49C406510BDCAB6824EE7C30FD852
PassNTLMv2      0C868A403BFD7A93A3001EF22EF02E3F

# Authentication dialect: NTLMv2 | NTLM2SR | NT | NTLM | LM
Auth            NTLMv2

# Parent proxy/proxies (tried in order for failover).
Proxy           10.0.0.41:8080
Proxy           10.0.0.42:8080

# Local listening port for this proxy service.
Listen          3128

# Hosts that should bypass the parent proxy (comma-separated patterns).
NoProxy         localhost, 127.0.0.*, 10.*, *.internal.corp

# Gateway mode: listen on all interfaces (yes) or loopback only (no, default).
Gateway         no

# ACL rules (evaluated in order).
Allow           127.0.0.1
Allow           10.0.0.0/8
Deny            0.0.0.0/0

# Header substitution for outgoing requests.
# Header        User-Agent: Mozilla/5.0

# Transparent tunnels: [saddr:]lport:rhost:rport
# Tunnel        11443:mail.corp:443

# SOCKS5 gateway:
# SOCKS5Proxy   1080
# SOCKS5User    user:password
